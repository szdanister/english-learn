<!doctype html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#005da7" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>Linguist</title>
  <style>
    :root {
      --bg: #f7f9fb;
      --card: #ffffff;
      --text: #191c1e;
      --muted: #414751;
      --border: #c1c7d3;
      --primary: #005da7;
      --primary-soft: #d4e3ff;
      --secondary: #266d00;
      --secondary-soft: #85fa51;
      --warning-soft: #ffdea4;
      --warning-text: #5d4200;
      --danger-soft: #ffdad6;
      --danger-text: #93000a;
    }

    * {
      box-sizing: border-box;
      font-family: "Lexend", "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 20px 100px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(247, 249, 251, 0.95);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      backdrop-filter: blur(8px);
    }

    .topbar h1 {
      margin: 0;
      font-size: 20px;
      color: var(--primary);
    }

    .nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: #fff;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 12px;
    }

    .nav button {
      border: 0;
      background: transparent;
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      color: var(--muted);
      font-weight: 600;
    }

    .nav button.active {
      background: var(--primary-soft);
      color: var(--primary);
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .level-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 6px 18px rgba(0, 93, 167, 0.08);
    }

    .clickable {
      cursor: pointer;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .row-header {
      align-items: flex-start;
    }

    .muted {
      color: var(--muted);
    }

    .badge {
      font-size: 12px;
      padding: 0 12px;
      min-height: 30px;
      border-radius: 999px;
      font-weight: 700;
      white-space: nowrap;
      line-height: 1;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .badge.completed {
      background: var(--secondary-soft);
      color: var(--secondary);
    }

    .badge.progress {
      background: var(--primary);
      color: #ffffff;
    }

    .badge.new {
      background: var(--danger-soft);
      color: var(--danger-text);
    }

    .progress {
      margin-top: 8px;
      height: 10px;
      border-radius: 999px;
      background: #e6e8ea;
      overflow: hidden;
    }

    .progress > div {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary-soft));
    }

    .section-title {
      margin: 8px 0 16px;
      color: var(--primary);
      font-size: 26px;
    }

    .sub-title {
      margin: 0 0 14px;
      color: var(--muted);
    }

    .practice-card {
      margin-top: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      min-height: 260px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 93, 167, 0.1);
      cursor: pointer;
      user-select: none;
    }

    .lang {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .sentence {
      font-size: 28px;
      line-height: 1.3;
      margin: 0;
    }

    .reveal-btn, .rate-btn {
      width: 100%;
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
    }

    .reveal-btn {
      background: var(--primary);
      color: #fff;
    }

    .rate {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .rate-btn.known {
      background: var(--secondary);
      color: #fff;
    }

    .rate-btn.unknown {
      background: var(--danger-soft);
      color: var(--danger-text);
    }

    .timer {
      display: inline-block;
      background: var(--warning-soft);
      color: var(--warning-text);
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .practice-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .close-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--muted);
      width: 36px;
      height: 36px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
    }

    .hidden {
      display: none !important;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 92px;
      transform: translateX(-50%);
      width: min(92vw, 520px);
      background: rgba(25, 28, 30, 0.8);
      color: #fff;
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      z-index: 80;
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease;
    }

    .toast.visible {
      opacity: 1;
    }

    .toast-text {
      margin: 0;
      font-size: 15px;
      line-height: 1.35;
      text-align: center;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .stats-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 6px 18px rgba(0, 93, 167, 0.08);
    }

    .stats-label {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
    }

    .stats-value {
      margin: 6px 0 0;
      font-size: 30px;
      color: var(--primary);
      font-weight: 700;
    }

    .settings-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 6px 18px rgba(0, 93, 167, 0.08);
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .setting-row:last-child {
      margin-bottom: 0;
    }

    input[type="range"] {
      width: 100%;
    }

    @media (max-width: 520px) {
      .row-header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <h1>Linguist</h1>
  </header>

  <main class="container">
    <section id="levels-screen" class="screen active">
      <h2 class="section-title">Szintek</h2>
      <p class="sub-title">Minden szint nyitva van. Válassz egyet és gyakorolj.</p>
      <div id="levels-list"></div>
    </section>

    <section id="practice-screen" class="screen">
      <div class="practice-top-row">
        <h2 class="section-title" style="margin-bottom:0;">Gyakorlás</h2>
        <button id="exit-practice" class="close-btn" aria-label="Kilépés">×</button>
      </div>
      <p class="muted" id="practice-progress"></p>
      <div class="timer">Hátralévő idő: <span id="time-left">10</span>mp</div>
      <div id="practice-card" class="practice-card" title="Kattintással fordítható">
        <div class="lang" id="card-lang">MAGYAR</div>
        <p class="sentence" id="card-text"></p>
      </div>
      <button id="reveal-btn" class="reveal-btn">Fordítás felfedése</button>
      <div id="rating" class="rate hidden">
        <button id="unknown-btn" class="rate-btn unknown">Nem tudom</button>
        <button id="known-btn" class="rate-btn known">Tudom</button>
      </div>
      <div id="round-result" class="settings-card hidden">
        <h3 style="margin-top:0;">Kör vége</h3>
        <p id="round-result-text" class="muted"></p>
        <button id="start-next-round" class="reveal-btn" style="margin-top:8px;">Új kör indítása</button>
        <button id="exit-after-round" class="rate-btn unknown">Kilépés a szintekhez</button>
      </div>
    </section>

    <section id="stats-screen" class="screen">
      <h2 class="section-title">Statisztika</h2>
      <div class="stats-grid">
        <article class="stats-card">
          <p class="stats-label">Összesített eredmény</p>
          <p class="stats-value" id="stats-overall">0%</p>
        </article>
        <article class="stats-card">
          <p class="stats-label">Összes próbálkozás</p>
          <p class="stats-value" id="stats-attempts">0</p>
        </article>
      </div>
      <div id="stats-levels"></div>
    </section>

    <section id="settings-screen" class="screen">
      <h2 class="section-title">Beállítások</h2>
      <div class="settings-card">
        <div class="setting-row">
          <label for="sentences-per-round">Mondatok száma körönként</label>
          <strong id="sentences-per-round-value">5</strong>
        </div>
        <input id="sentences-per-round" type="range" min="1" max="30" value="5" />
      </div>
      <div class="settings-card">
        <div class="setting-row">
          <label for="auto-reveal-seconds">Automatikus fordítás (mp)</label>
          <strong id="auto-reveal-seconds-value">10</strong>
        </div>
        <input id="auto-reveal-seconds" type="range" min="3" max="30" value="10" />
      </div>
      <div class="settings-card">
        <button id="reset-progress" class="rate-btn unknown" style="margin-top:0;">Eredmények törlése</button>
      </div>
    </section>
  </main>

  <nav class="nav">
    <button id="nav-levels" class="active">Szintek</button>
    <button id="nav-practice">Gyakorlás</button>
    <button id="nav-stats">Statisztika</button>
    <button id="nav-settings">Beállítások</button>
  </nav>

  <div id="answer-toast" class="toast" aria-live="polite" aria-atomic="true">
    <p id="answer-toast-text" class="toast-text"></p>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
